<div class="px-2 animate-fade-in pb-20">
    <div class="flex items-center justify-between mb-4 mt-2 px-1">
        <h2 class="text-xl font-extrabold tracking-tight">Статистика <span id="statsYearBadge" class="text-blue-500 font-mono"></span></h2>
        <button onclick="window.loadStatistics()" class="w-8 h-8 flex items-center justify-center bg-gray-200 dark:bg-gray-800 rounded-full text-lg active:scale-95 transition-transform" title="Оновити">
            🔄
        </button>
    </div>

    <!-- Skeleton Loader -->
    <div id="statsSkeleton" class="grid grid-cols-2 gap-3 mb-4">
        <div class="ios-card p-4 animate-pulse h-24"></div>
        <div class="ios-card p-4 animate-pulse h-24"></div>
        <div class="ios-card p-4 animate-pulse h-24"></div>
        <div class="ios-card p-4 animate-pulse h-24"></div>
        <div class="ios-card p-4 animate-pulse h-24"></div>
        <div class="ios-card p-4 animate-pulse h-24"></div>
        <div class="ios-card p-4 animate-pulse h-24 col-span-2"></div>
    </div>

    <!-- Data Container -->
    <div id="statsContent" class="hidden">
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            
            <!-- Відпрацьовано Днів -->
            <div class="ios-card p-4 flex flex-col justify-between bg-gradient-to-br from-blue-50 to-blue-100 dark:from-blue-900/30 dark:to-blue-800/20 border border-blue-200 dark:border-blue-800/50">
                <div class="text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest mb-1 flex items-center gap-1">
                    💼 Днів роботи
                </div>
                <div class="text-3xl font-black text-gray-900 dark:text-white" id="statWorkedDays">--</div>
            </div>

            <!-- Відпрацьовано Годин -->
            <div class="ios-card p-4 flex flex-col justify-between bg-gradient-to-br from-indigo-50 to-indigo-100 dark:from-indigo-900/30 dark:to-indigo-800/20 border border-indigo-200 dark:border-indigo-800/50">
                <div class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest mb-1 flex items-center gap-1">
                    ⏱️ Годин роботи
                </div>
                <div class="text-3xl font-black text-gray-900 dark:text-white" id="statWorkedHours">--</div>
            </div>

            <!-- Вихідних -->
            <div class="ios-card p-4 flex flex-col justify-between bg-gradient-to-br from-green-50 to-green-100 dark:from-green-900/30 dark:to-green-800/20 border border-green-200 dark:border-green-800/50">
                <div class="text-[10px] font-bold text-green-600 dark:text-green-400 uppercase tracking-widest mb-1 flex items-center gap-1">
                    🛋️ Вихідних
                </div>
                <div class="text-3xl font-black text-gray-900 dark:text-white" id="statWeekends">--</div>
            </div>

            <!-- Донорство -->
            <div class="ios-card p-4 flex flex-col justify-between bg-gradient-to-br from-red-50 to-red-100 dark:from-red-900/30 dark:to-red-800/20 border border-red-200 dark:border-red-800/50">
                <div class="text-[10px] font-bold text-red-600 dark:text-red-400 uppercase tracking-widest mb-1 flex items-center gap-1">
                    🩸 Донорство
                </div>
                <div class="text-3xl font-black text-gray-900 dark:text-white flex items-end gap-1">
                    <span id="statDonorDays">--</span> <span class="text-xs font-normal text-gray-500 dark:text-gray-400 mb-1">днів</span>
                </div>
            </div>

            <!-- Лікарняні -->
            <div class="ios-card p-4 flex flex-col justify-between bg-gradient-to-br from-rose-50 to-rose-100 dark:from-rose-900/30 dark:to-rose-800/20 border border-rose-200 dark:border-rose-800/50">
                <div class="text-[10px] font-bold text-rose-600 dark:text-rose-400 uppercase tracking-widest mb-1 flex items-center gap-1">
                    💊 Лікарняні
                </div>
                <div class="text-3xl font-black text-gray-900 dark:text-white flex items-end gap-1">
                    <span id="statSickDays">--</span> <span class="text-xs font-normal text-gray-500 dark:text-gray-400 mb-1">днів</span>
                </div>
            </div>
            
            <!-- Дні без лікарняних -->
            <div class="ios-card p-4 flex flex-col justify-between bg-gradient-to-br from-amber-50 to-amber-100 dark:from-amber-900/30 dark:to-amber-800/20 border border-amber-200 dark:border-amber-800/50">
                <div class="text-[10px] font-bold text-amber-600 dark:text-amber-400 uppercase tracking-widest mb-1 flex items-center gap-1 leading-tight">
                    💪 Без лікарняних поспіль
                </div>
                <div class="text-3xl font-black text-gray-900 dark:text-white flex items-end gap-1">
                    <span id="statDaysWithoutSick">--</span> <span class="text-xs font-normal text-gray-500 dark:text-gray-400 mb-1">днів</span>
                </div>
            </div>

        </div>

        <!-- Відпустка (Широка картка) -->
        <div class="ios-card p-5 bg-gradient-to-br from-teal-50 to-teal-100 dark:from-teal-900/30 dark:to-teal-800/20 border border-teal-200 dark:border-teal-800/50">
            <div class="flex justify-between items-end mb-3">
                <div>
                    <div class="text-[10px] font-bold text-teal-600 dark:text-teal-400 uppercase tracking-widest mb-1 flex items-center gap-1">
                        🌴 Відпустка
                    </div>
                    <div class="text-3xl font-black text-gray-900 dark:text-white flex items-end gap-1">
                        <span id="statVacationUsed">--</span>
                        <span class="text-sm font-bold text-gray-400 dark:text-gray-500 mb-1">/ 24</span>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-xs text-gray-500 dark:text-gray-400 font-medium">Залишилось</div>
                    <div class="text-xl font-bold text-teal-700 dark:text-teal-300" id="statVacationRemaining">-- днів</div>
                </div>
            </div>
            
            <!-- Прогрес бар відпустки -->
            <div class="w-full bg-white/50 dark:bg-black/30 rounded-full h-2.5 mt-2 overflow-hidden shadow-inner">
                <div id="statVacationProgress" class="bg-teal-500 h-2.5 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
        </div>

    </div>
</div>
