<div id="todoViewContainer" class="space-y-4 pb-10 w-full">
    <div class="flex items-center justify-between mb-2 mt-2">
        <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-indigo-600">📌 Всі задачі</h2>
    </div>

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row gap-3 mb-4 bg-gray-50 dark:bg-[#2C2C2E] p-3 rounded-xl border border-gray-100 dark:border-gray-800">
        <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300 font-medium cursor-pointer mb-2 sm:mb-0">
            <input type="checkbox" id="taskFilterHideCompleted" class="w-4 h-4 accent-blue-500 rounded border-gray-300 cursor-pointer" onchange="window.renderTodoProxy()">
            Приховати виконані
        </label>
        
        <div id="taskFilterEmployeeContainer" class="hidden flex-1 sm:ml-auto flex gap-3">
            <button id="todoStoreFilterWrapper" onclick="window.openStoreFilterModal()" class="hidden ios-card flex-1 px-3 py-2 flex flex-col items-start justify-center relative glass-panel active:scale-[0.98] transition-transform">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-0.5 mt-0.5">Магазин (Admin)</span>
                <div class="flex items-center justify-between w-full">
                    <span class="currentStoreFilterLabelText text-blue-500 font-bold text-sm truncate">Всі</span>
                    <span class="text-gray-300 text-[10px] ml-1 flex-shrink-0">▼</span>
                </div>
            </button>
            <button onclick="window.openFilterModal()" class="ios-card flex-1 px-3 py-2 flex flex-col items-start justify-center relative glass-panel active:scale-[0.98] transition-transform bg-white dark:bg-[#1C1C1E] border border-gray-100 dark:border-gray-800 rounded-xl">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-0.5 mt-0.5">Співробітник</span>
                <div class="flex items-center justify-between w-full">
                    <span class="currentFilterLabelText text-blue-500 font-bold text-sm truncate">Всі</span>
                    <span class="text-gray-300 text-[10px] ml-1 flex-shrink-0">▼</span>
                </div>
            </button>
        </div>
    </div>
    
    <!-- SM / Admin View -->
    <div id="todoAdminView" class="hidden space-y-6"></div>

    <!-- Employee View -->
    <div id="todoEmployeeView" class="hidden space-y-4">
        <div id="todoEmployeeList" class="space-y-3"></div>
    </div>
</div>
