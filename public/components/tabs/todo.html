<div id="todoViewContainer" class="space-y-4 pb-10 w-full">
    <div class="flex items-center justify-between mb-2 mt-2">
        <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-indigo-600">📌 Всі задачі</h2>
    </div>

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row gap-3 mb-4 bg-gray-50 dark:bg-[#2C2C2E] p-3 rounded-xl border border-gray-100 dark:border-gray-800">
        <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300 font-medium cursor-pointer">
            <input type="checkbox" id="taskFilterHideCompleted" class="w-4 h-4 accent-blue-500 rounded border-gray-300 cursor-pointer" onchange="window.renderTodoProxy()">
            Приховати виконані
        </label>
        
        <div id="taskFilterEmployeeContainer" class="hidden flex-1 sm:ml-auto flex items-center gap-2">
            <span class="text-xs text-gray-500 font-medium whitespace-nowrap">Співробітник:</span>
            <div class="relative w-full max-w-[200px]">
                <select id="taskFilterEmployee" class="ios-input bg-white dark:bg-[#1C1C1E] appearance-none w-full py-1.5 px-3 text-sm h-auto cursor-pointer" onchange="window.renderTodoProxy()">
                    <option value="all">Всі співробітники</option>
                </select>
                <div class="absolute right-3 top-2 text-gray-400 pointer-events-none text-xs">▼</div>
            </div>
        </div>
    </div>
    
    <!-- SM / Admin View -->
    <div id="todoAdminView" class="hidden space-y-6"></div>

    <!-- Employee View -->
    <div id="todoEmployeeView" class="hidden space-y-4">
        <div id="todoEmployeeList" class="space-y-3"></div>
    </div>
</div>
