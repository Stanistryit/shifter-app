<div id="listViewContainer" class="relative">
    <div class="sticky top-[-1px] z-40 bg-[#f4f4f5] dark:bg-black/95 backdrop-blur-md pb-2 pt-3 mb-3 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center -mx-4 px-4">
        <button onclick="changeMonth(-1)" class="text-blue-500 text-2xl font-bold px-4 py-1 active:scale-95 transition-transform">‹</button>
        <h2 id="listMonthTitle" class="font-bold text-lg capitalize"></h2>
        <button onclick="changeMonth(1)" class="text-blue-500 text-2xl font-bold px-4 py-1 active:scale-95 transition-transform">›</button>
    </div>
    
    <button id="archiveToggleBtn" onclick="toggleArchive()"
        class="hidden w-full text-center text-xs text-gray-400 py-3 mb-2 font-medium active:scale-95 transition-transform">↓
        Минулі дні (<span id="archiveCount">0</span>) ↓</button>
    <div id="archiveContainer" class="hidden space-y-3 mb-3 opacity-60 grayscale"></div>
    <div id="scheduleView" class="space-y-4 pb-10"></div>
</div>
