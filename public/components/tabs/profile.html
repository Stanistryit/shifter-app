<div class="ios-card p-6 animate-slide-up text-center mb-10">
    <div class="relative inline-block mx-auto mb-4">
        <div
            class="w-24 h-24 bg-gray-100 dark:bg-[#2C2C2E] rounded-full overflow-hidden flex items-center justify-center text-4xl border border-gray-200 dark:border-gray-700 shadow-xl">
            <img id="profileAvatarImg" src="" class="hidden w-full h-full object-cover">
            <span id="profileAvatarPlaceholder">👤</span>
        </div>
        <div class="absolute bottom-0 right-0 bg-blue-500 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-lg border-2 border-white dark:border-[#1C1C1E] cursor-pointer active:scale-90 transition-transform"
            onclick="triggerHaptic(); openAvatarModal()">
            <span class="text-sm pointer-events-none">✏️</span>
        </div>
    </div>
    <h2 id="profileNameDisplay" class="font-bold text-2xl mb-1 mt-2">...</h2>
    <p id="profileRoleDisplay" class="text-xs text-gray-500 mb-4 uppercase tracking-wider font-bold">...</p>

    <!-- Badges UI -->
    <div id="profileBadgesContainer" class="flex flex-wrap justify-center gap-2 mb-8 min-h-[30px]">
        <!-- Rendered dynamically -->
    </div>

    <div class="space-y-3 mb-8 relative z-10 text-left">
        <button id="profileBtnChangeStore" onclick="openTransferModal()"
            class="hidden w-full text-center flex justify-between items-center gap-2 ios-input p-4 font-medium text-blue-500 active:scale-95 transition-transform">
            <span class="font-medium text-gray-700 dark:text-gray-200">Змінити магазин</span>
            <span>🔄</span>
        </button>
        <button id="profileBtnStoreSettings" onclick="openStoreSettingsModal()"
            class="hidden w-full text-center flex justify-between items-center gap-2 ios-input p-4 font-medium text-blue-500 active:scale-95 transition-transform">
            <span class="font-medium text-gray-700 dark:text-gray-200">Налаштування магазину</span>
            <span>⚙️</span>
        </button>
        <button onclick="openChangePasswordModal()"
            class="w-full text-center flex justify-between items-center gap-2 ios-input p-4 font-medium text-blue-500 active:scale-95 transition-transform">
            <span class="font-medium text-gray-700 dark:text-gray-200">Змінити пароль</span>
            <span>🔐</span>
        </button>
        <div class="ios-input p-4 w-full flex flex-col gap-4">
            <div onclick="toggleTheme()" class="flex justify-between items-center cursor-pointer active:opacity-70 transition-opacity">
                <span class="font-medium text-gray-700 dark:text-gray-200">Темний режим</span>
                <span id="themeIcon">🌙</span>
            </div>
            
            <div class="w-full h-px bg-gray-100 dark:bg-gray-800"></div>
            
            <div class="w-full flex flex-col text-left">
                <label class="font-medium text-gray-700 dark:text-gray-200 w-full mb-3">Колірна схема</label>
                <div id="profileColorThemeContainer" class="flex items-center justify-between px-1">
                    <button data-theme-value="default" onclick="changeColorTheme('default')" class="w-8 h-8 rounded-full bg-[#3b82f6] shadow-sm ring-offset-2 dark:ring-offset-[#1C1C1E] active:scale-90 transition-all"></button>
                    <button data-theme-value="emerald" onclick="changeColorTheme('emerald')" class="w-8 h-8 rounded-full bg-[#10b981] shadow-sm ring-offset-2 dark:ring-offset-[#1C1C1E] active:scale-90 transition-all"></button>
                    <button data-theme-value="purple" onclick="changeColorTheme('purple')" class="w-8 h-8 rounded-full bg-[#8b5cf6] shadow-sm ring-offset-2 dark:ring-offset-[#1C1C1E] active:scale-90 transition-all"></button>
                    <button data-theme-value="orange" onclick="changeColorTheme('orange')" class="w-8 h-8 rounded-full bg-[#f97316] shadow-sm ring-offset-2 dark:ring-offset-[#1C1C1E] active:scale-90 transition-all"></button>
                    <button data-theme-value="rose" onclick="changeColorTheme('rose')" class="w-8 h-8 rounded-full bg-[#f43f5e] shadow-sm ring-offset-2 dark:ring-offset-[#1C1C1E] active:scale-90 transition-all"></button>
                </div>
            </div>
        </div>

        <button id="connectTelegramBtn" onclick="connectTelegram()"
            class="hidden w-full flex justify-between items-center bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 p-4 border-none rounded-xl mt-3 active:scale-95 transition-transform">
            <div class="flex flex-col text-left">
                <span class="font-bold">Підключити Telegram ✈️</span>
                <span class="text-[10px] font-bold uppercase opacity-70">Отримувати сповіщення</span>
            </div>
            <span>🔗</span>
        </button>

        <button onclick="copyCalendarLink()"
            class="w-full flex justify-between items-center bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 p-4 border-none rounded-xl mt-3 mb-3 active:scale-95 transition-transform">
            <div class="flex flex-col text-left">
                <span class="font-bold">Експорт в календар 📅</span>
                <span class="text-[10px] font-bold uppercase opacity-70">iCal посилання для Google/Apple</span>
            </div>
            <span>📋</span>
        </button>

        <div class="w-full flex justify-between items-center ios-input p-4 text-left">
            <label class="font-medium text-gray-700 dark:text-gray-200 w-full mb-1">Сповіщення (задачі, зміни)</label>
            <select id="profileNotificationPref" onchange="saveNotificationPref(this.value)"
                class="bg-transparent font-bold text-blue-500 text-right outline-none text-sm appearance-none cursor-pointer">
                <option value="telegram">Telegram</option>
                <option value="push">Браузер (Push)</option>
                <option value="both">Telegram + Push</option>
            </select>
        </div>

        <button onclick="togglePushNotifications()"
            class="w-full flex justify-between items-center ios-input p-4 active:scale-95 transition-transform">
            <span class="font-medium text-gray-700 dark:text-gray-200">Налаштувати Push підписку</span>
            <span id="pushIcon">🔔</span>
        </button>


        <a href="https://t.me/StanisLoveIt" target="_blank"
            class="w-full flex justify-between items-center bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 p-4 border-none rounded-xl mt-3 active:scale-95 transition-transform cursor-pointer">
            <div class="flex flex-col text-left">
                <span class="font-bold">Зв'язок з розробником 💬</span>
                <span class="text-[10px] font-bold uppercase opacity-70">Ідеї або знайшли баг?</span>
            </div>
            <span>👨‍💻</span>
        </a>


    </div>

    <div class="pt-6 border-t border-gray-100 dark:border-gray-800 relative z-10">
        <button onclick="logout()"
            class="w-full py-4 px-4 text-red-500 font-bold bg-red-50 dark:bg-red-900/20 rounded-xl active:scale-95 transition-transform flex justify-center items-center gap-2">
            <span>🚪</span> Вийти з акаунту
        </button>
    </div>
</div>
