<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shifter</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗓️</text></svg>">

    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Shifter">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body
    class="bg-gray-100 text-black dark:bg-black dark:text-white font-sans min-h-screen flex flex-col selection:bg-blue-500 selection:text-white pb-safe">
    <div id="topProgressBar" class="top-progress-bar"></div>
    <div id="toastContainer"
        class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] space-y-2 w-full max-w-xs pointer-events-none">
    </div>

    <!-- PWA Install Prompt Banner (Hidden by default) -->
    <div id="pwaInstallBanner"
        class="hidden fixed bottom-24 left-4 right-4 z-[60] bg-white dark:bg-[#1C1C1E] p-4 rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-800 flex flex-col md:flex-row gap-3 items-center transform transition-transform duration-500 translate-y-full">
        <div class="flex-1 flex gap-3 items-center">
            <div
                class="w-12 h-12 bg-gray-100 dark:bg-gray-800 rounded-xl flex items-center justify-center text-2xl flex-shrink-0">
                📱</div>
            <div>
                <h4 class="font-bold text-sm text-gray-900 dark:text-white">Встановити додаток</h4>
                <p id="pwaInstallText" class="text-xs text-gray-500">Завантажуйте швидше та використовуйте емодзі на
                    екрані!</p>
            </div>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <button onclick="dismissPwaInstall()"
                class="flex-1 md:w-auto px-4 py-2 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-xl text-sm font-bold active:scale-95 transition-transform">Скасувати</button>
            <button onclick="installPwa()" id="pwaInstallBtn"
                class="flex-1 md:w-auto px-4 py-2 bg-blue-500 text-white rounded-xl text-sm font-bold active:scale-95 transition-transform shadow-lg shadow-blue-500/30">Встановити</button>
        </div>
    </div>

    <div id="loginScreen" class="hidden flex-grow flex items-center justify-center p-6 min-h-screen">
        <div class="ios-card p-8 w-full max-w-sm text-center relative overflow-hidden transition-all duration-300">
            <h1
                class="text-4xl font-bold mb-2 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-indigo-600">
                Shifter</h1>

            <div id="loginContainer" class="transition-opacity duration-300">
                <p class="text-gray-400 mb-6 text-sm">Увійдіть для доступу</p>
                <div class="space-y-3">
                    <div class="floating-group">
                        <input type="text" id="loginUser" placeholder=" " class="ios-input">
                        <label class="floating-label-text">Логін</label>
                    </div>
                    <div class="floating-group">
                        <input type="password" id="loginPass" placeholder=" " class="ios-input">
                        <label class="floating-label-text">Пароль</label>
                    </div>
                    <button onclick="login()" class="btn-primary mt-4 shadow-lg shadow-blue-500/30">Увійти</button>

                    <div
                        class="mt-4 pt-4 border-t border-gray-100 dark:border-gray-800 flex justify-between items-center px-1">
                        <button onclick="toggleAuthMode('forgot')"
                            class="text-sm text-gray-500 hover:text-black dark:hover:text-white font-medium hover:underline transition-colors">Забули
                            пароль?</button>
                        <button onclick="toggleAuthMode('register')"
                            class="text-sm text-blue-500 font-medium hover:underline">Реєстрація</button>
                    </div>
                </div>
            </div>

            <div id="registerContainer" class="hidden transition-opacity duration-300">
                <p class="text-gray-400 mb-4 text-sm">Створення нового акаунту</p>
                <div class="space-y-3 text-left">

                    <div class="floating-group">
                        <input type="text" id="regFullName" placeholder=" " class="ios-input">
                        <label class="floating-label-text">ПІП (Іванов Іван Іванович)</label>
                    </div>

                    <div class="floating-group">
                        <input type="text" id="regLogin" placeholder=" " class="ios-input">
                        <label class="floating-label-text">Логін</label>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div class="floating-group">
                            <input type="password" id="regPass" placeholder=" " class="ios-input">
                            <label class="floating-label-text">Пароль</label>
                        </div>
                        <div class="floating-group">
                            <input type="password" id="regPassConfirm" placeholder=" " class="ios-input">
                            <label class="floating-label-text">Ще раз</label>
                        </div>
                    </div>

                    <div class="floating-group">
                        <input type="tel" id="regPhone" placeholder=" " class="ios-input">
                        <label class="floating-label-text">Телефон (+380...)</label>
                    </div>

                    <div class="floating-group">
                        <input type="email" id="regEmail" placeholder=" " class="ios-input">
                        <label class="floating-label-text">Email</label>
                    </div>

                    <div class="relative mt-2">
                        <label class="text-[10px] uppercase font-bold text-gray-400 ml-2 mb-1 block">Магазин</label>
                        <div class="relative">
                            <select id="regStore" class="ios-input bg-transparent appearance-none w-full">
                                <option value="" disabled selected>Завантаження списку...</option>
                            </select>
                            <div class="absolute right-3 top-3.5 text-gray-400 pointer-events-none">▼</div>
                        </div>
                    </div>

                    <button onclick="registerUser()"
                        class="btn-primary mt-4 bg-green-500 shadow-lg shadow-green-500/30">Створити акаунт</button>

                    <div class="mt-4 pt-4 border-t border-gray-100 dark:border-gray-800 text-center">
                        <button onclick="toggleAuthMode('login')"
                            class="text-sm text-gray-500 hover:text-black dark:hover:text-white transition-colors">←
                            Повернутися до входу</button>
                    </div>
                </div>
            </div>

            <!-- Forgot Password Container -->
            <div id="forgotPasswordContainer" class="hidden transition-opacity duration-300">
                <p class="text-gray-400 mb-4 text-sm">Скидання пароля</p>
                <div class="space-y-3 text-left">
                    <p class="text-xs text-gray-500 mb-2">
                        Введіть свій логін, і ми надішлемо інструкції у ваш прив'язаний Телеграм.
                    </p>
                    <div class="floating-group mt-2">
                        <input type="text" id="forgotUsername" placeholder=" " class="ios-input">
                        <label class="floating-label-text">Ваш Логін</label>
                    </div>

                    <button onclick="requestPasswordReset()"
                        class="btn-primary mt-4 bg-purple-500 shadow-lg shadow-purple-500/30">Відновити пароль</button>

                    <div class="mt-4 pt-4 border-t border-gray-100 dark:border-gray-800 text-center">
                        <button onclick="toggleAuthMode('login')"
                            class="text-sm text-gray-500 hover:text-black dark:hover:text-white transition-colors">←
                            Повернутися до входу</button>
                    </div>
                </div>
            </div>

            <!-- Reset Password Container (Appears when Token is in URL) -->
            <div id="resetPasswordContainer" class="hidden transition-opacity duration-300">
                <p class="text-gray-400 mb-4 text-sm">Новий пароль</p>
                <div class="space-y-3 text-left">
                    <p class="text-xs text-gray-500 mb-2">
                        Придумайте новий безпечний пароль.
                    </p>
                    <input type="hidden" id="resetToken">
                    <input type="hidden" id="resetUserId">

                    <div class="floating-group mb-2">
                        <input type="password" id="resetNewPassword" placeholder=" " class="ios-input">
                        <label class="floating-label-text">Новий пароль</label>
                    </div>
                    <div class="floating-group">
                        <input type="password" id="resetConfirmPassword" placeholder=" " class="ios-input">
                        <label class="floating-label-text">Повторіть пароль</label>
                    </div>

                    <button onclick="submitNewPassword()" class="btn-primary mt-4 shadow-lg shadow-blue-500/30">Зберегти
                        пароль</button>

                    <div class="mt-4 pt-4 border-t border-gray-100 dark:border-gray-800 text-center">
                        <button onclick="toggleAuthMode('login')"
                            class="text-sm text-gray-500 hover:text-black dark:hover:text-white transition-colors">←
                            Повернутися до входу</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="appScreen"
        class="hidden w-full pb-36 lg:pb-safe lg:pl-64 relative opacity-0 transition-opacity duration-500">

        <!-- SIDEBAR FOR DESKTOP -->
        <div id="desktop-sidebar-container"></div>

        <!-- MOBILE NAVBAR -->
        <div id="mobile-navbar-container"></div>

        <div class="container mx-auto p-4 max-w-[95%] lg:max-w-4xl space-y-4">

            <!-- Контейнер для Дашборду -->
            <div id="dashboard-container"></div>

            <!-- Контейнер для Інтерфейсу Адміністратора -->
            <div id="admin-container"></div>

            <!-- Контейнер для Головної (Список) -->
            <div id="list-container"></div>

            <!-- Контейнер для Календаря -->
            <div id="calendar-container"></div>

            <!-- Контейнер для Таблиці (Grid) -->
            <div id="grid-container"></div>

            <!-- Контейнер для KPI -->
            <div id="kpi-container"></div>

            <!-- Контейнер для ToDo -->
            <div id="todo-container" class="hidden"></div>

            <!-- Контейнер для Профілю -->
            <div id="profile-container"></div>

        </div>

        <!-- BOTTOM NAVBAR FOR MOBILE -->
        <div id="bottom-navbar-container"></div>

        <button id="backToTopBtn" onclick="scrollToTop()"
            class="fixed bottom-24 right-6 w-12 h-12 bg-blue-500 text-white rounded-full shadow-lg shadow-blue-500/40 flex items-center justify-center text-2xl z-50 transition-all duration-300 opacity-0 hidden hover:scale-110 active:scale-95">↑</button>

        <!-- Контейнер для всіх модалок -->
        <div id="modals-container"></div>

        <script type="module" src="js/app.js"></script>
</body>

</html>
