<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shifter Widget</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        body {
            background-color: transparent !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        .widget-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 320px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dark .widget-card {
            background: rgba(28, 28, 30, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            color: white;
        }

        .btn-open {
            background: #3b82f6;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            display: block;
            margin-top: 8px;
            transition: transform 0.2s;
        }
        
        .btn-open:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-black transition-colors duration-300">

    <div class="widget-card text-center">
        <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest flex items-center justify-center gap-1">
            📅 Наступна зміна
        </div>
        
        <div id="widgetStatus" class="flex flex-col items-center justify-center min-h-[100px]">
            <div class="animate-pulse flex space-x-2">
                <div class="w-3 h-3 bg-gray-400 rounded-full"></div>
                <div class="w-3 h-3 bg-gray-400 rounded-full"></div>
                <div class="w-3 h-3 bg-gray-400 rounded-full"></div>
            </div>
            <p class="text-xs text-gray-400 mt-3">Завантаження...</p>
        </div>

        <a href="/?source=widget" class="btn-open">Відкрити додаток</a>
    </div>

    <script>
        // Apply theme from localStorage if exists
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.classList.remove('dark');
        }

        async function loadNextShift() {
            try {
                // Fetch me to get name and store
                const meRes = await fetch('/api/me');
                const meData = await meRes.json();
                
                if (!meData.loggedIn || !meData.user) {
                    document.getElementById('widgetStatus').innerHTML = '<p class="text-sm font-medium text-gray-500">Увійдіть в додаток</p>';
                    return;
                }

                const myName = meData.user.name;

                // Fetch shifts
                const shiftsRes = await fetch('/api/shifts');
                const shifts = await shiftsRes.json();

                if (!shifts || shifts.length === 0) {
                    document.getElementById('widgetStatus').innerHTML = '<p class="text-xl font-bold">Вільний день</p><p class="text-xs text-gray-400">Графік порожній</p>';
                    return;
                }

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                // Find next shift
                let nextShift = null;
                let nextDateObj = null;

                const myShifts = shifts.filter(s => s.name === myName);
                
                for (let s of myShifts) {
                    if (s.start === 'Лікарняний' || s.start === 'Відпустка' || s.start === 'Вихідний' || !s.start) continue;

                    const parts = s.date.split('-');
                    if (parts.length === 3) {
                        const sDate = new Date(parts[0], parts[1] - 1, parts[2]);
                        sDate.setHours(0,0,0,0);
                        if (sDate >= today) {
                            if (!nextDateObj || sDate < nextDateObj) {
                                nextDateObj = sDate;
                                nextShift = s;
                            }
                        }
                    }
                }

                const statusEl = document.getElementById('widgetStatus');
                
                if (nextShift) {
                    const diffTime = nextDateObj - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    let dayText = nextDateObj.toLocaleDateString('uk-UA', { weekday: 'long', day: 'numeric', month: 'long' });
                    
                    if (diffDays === 0) dayText = 'Сьогодні';
                    else if (diffDays === 1) dayText = 'Завтра';

                    statusEl.innerHTML = `
                        <div class="text-4xl font-black mb-1 bg-gradient-to-r from-blue-500 to-indigo-500 bg-clip-text text-transparent">
                            ${nextShift.start}
                        </div>
                        <div class="text-sm font-medium text-gray-600 dark:text-gray-300 capitalize">
                            ${dayText}
                        </div>
                    `;
                } else {
                    statusEl.innerHTML = '<p class="text-2xl font-bold">Вільний день</p><p class="text-xs text-gray-400 mt-1">Немає запланованих змін</p>';
                }

            } catch (err) {
                console.error(err);
                document.getElementById('widgetStatus').innerHTML = '<p class="text-sm text-red-500 font-bold">Помилка з\'єднання</p>';
            }
        }

        // Run
        loadNextShift();
    </script>
</body>
</html>
